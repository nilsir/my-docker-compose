services:
  sentry-redis:
    image: redis:alpine
    container_name: sentry-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - sentry-net

  sentry-postgres:
    image: postgres:14
    container_name: sentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SENTRY_DB_USER:-sentry}
      POSTGRES_PASSWORD: ${SENTRY_DB_PASSWORD:-sentry}
      POSTGRES_DB: ${SENTRY_DB_NAME:-sentry}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - sentry-net

  sentry:
    image: getsentry/sentry:latest
    platform: linux/amd64
    container_name: sentry
    restart: unless-stopped
    depends_on:
      - sentry-redis
      - sentry-postgres
    ports:
      - "${SENTRY_PORT:-9000}:9000"
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:-your-secret-key-here-change-it}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_USER: ${SENTRY_DB_USER:-sentry}
      SENTRY_DB_PASSWORD: ${SENTRY_DB_PASSWORD:-sentry}
      SENTRY_DB_NAME: ${SENTRY_DB_NAME:-sentry}
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
      SENTRY_DEFAULT_LANGUAGE: ${SENTRY_DEFAULT_LANGUAGE:-zh-cn}
      TZ: ${SENTRY_DEFAULT_TIMEZONE:-Asia/Shanghai}
    networks:
      - sentry-net

  sentry-cron:
    image: getsentry/sentry:latest
    platform: linux/amd64
    container_name: sentry-cron
    restart: unless-stopped
    depends_on:
      - sentry
    command: run cron
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:-your-secret-key-here-change-it}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_USER: ${SENTRY_DB_USER:-sentry}
      SENTRY_DB_PASSWORD: ${SENTRY_DB_PASSWORD:-sentry}
      SENTRY_DB_NAME: ${SENTRY_DB_NAME:-sentry}
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    networks:
      - sentry-net

  sentry-worker:
    image: getsentry/sentry:latest
    platform: linux/amd64
    container_name: sentry-worker
    restart: unless-stopped
    depends_on:
      - sentry
    command: run worker
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:-your-secret-key-here-change-it}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_USER: ${SENTRY_DB_USER:-sentry}
      SENTRY_DB_PASSWORD: ${SENTRY_DB_PASSWORD:-sentry}
      SENTRY_DB_NAME: ${SENTRY_DB_NAME:-sentry}
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    networks:
      - sentry-net

networks:
  sentry-net:
    external: true
